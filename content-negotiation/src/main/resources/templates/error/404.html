<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404错误</title>
    <style>
        span {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>出现404错误</h1>
<span>错误信息如下:</span><br>
错误发生时间:<span th:text="${timestamp}"></span><br>
HTTP状态码:<span th:text="${status}"></span><br>
错误类型:<span th:text="${error}"></span><br>
</body>
</html>
